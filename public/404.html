<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #0A0A0A;
    color: #F4F4F2;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem 1.5rem;
    text-align: center;
  }

  .bg-glow {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 700px 500px at 50% 60%, rgba(195,246,12,0.07), transparent 65%);
    pointer-events: none;
  }

  .logo-stage {
    position: relative;
    width: min(90vw, 520px);
    margin: 0 auto 2.2rem;
  }

  /* Establishes the logo's aspect ratio (1942:809) using a
     padding-top percentage, which is relative to the element's
     WIDTH. This works in effectively every browser, including
     older in-app webviews (Instagram/TikTok/WhatsApp browsers,
     which someone scanning a physical sticker is fairly likely
     to be using) that may not support the newer `aspect-ratio`
     CSS property. */
  .logo-stage::before {
    content: '';
    display: block;
    padding-top: 41.658084%; /* 809 / 1942 * 100, exactly */
  }

  .logo-stage svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* Dim base layer — always visible, gives the "outline" the liquid fills into */
  .logo-base { opacity: 1; }
  .logo-base path { fill: rgba(244,244,242,0.14); }

  /* Green fill layer — clipped, animates from fully hidden to fully revealed */
  .logo-fill-wrap {
    position: absolute;
    inset: 0;
    clip-path: inset(100% 0% 0% 0%);
    animation: fillUp 2.6s cubic-bezier(0.65, 0, 0.35, 1) forwards;
    animation-delay: 0.3s;
  }
  .logo-fill-wrap path { fill: #C3F60C; }

  @keyframes fillUp {
    0%   { clip-path: inset(100% 0% 0% 0%); }
    100% { clip-path: inset(0% 0% 0% 0%); }
  }

  /* Rippling liquid surface line riding the fill boundary */
  .liquid-surface {
    position: absolute;
    left: -10%;
    width: 120%;
    height: 14%;
    top: 100%;
    background-image: repeating-linear-gradient(
      90deg,
      rgba(210,255,90,0.55) 0px,
      rgba(210,255,90,0.55) 40px,
      rgba(195,246,12,0.15) 40px,
      rgba(195,246,12,0.15) 80px
    );
    background-size: 160px 100%;
    mix-blend-mode: screen;
    animation:
      riseSurface 2.6s cubic-bezier(0.65, 0, 0.35, 1) forwards,
      rippleMove 1.4s linear infinite;
    animation-delay: 0.3s, 0.3s;
    opacity: 0.8;
  }

  @keyframes riseSurface {
    0%   { top: 100%; }
    100% { top: -2%; }
  }
  @keyframes rippleMove {
    0%   { background-position-x: 0px; }
    100% { background-position-x: 160px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .logo-fill-wrap { animation: none; clip-path: inset(0% 0% 0% 0%); }
    .liquid-surface { animation: none; opacity: 0; }
  }

  .status-code {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.16em;
    color: #C3F60C;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .status-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 1.4rem;
    margin-bottom: 0.6rem;
  }

  .status-sub {
    color: #9a9a96;
    font-size: 0.92rem;
    max-width: 380px;
    line-height: 1.55;
    margin-bottom: 1.6rem;
  }

  .home-link {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.8rem 1.5rem;
    border-radius: 10px;
    background: #C3F60C;
    color: #0A0A0A;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 0.88rem;
    text-decoration: none;
  }

  .redirect-note {
    margin-top: 1.4rem;
    color: #6b6b68;
    font-size: 0.78rem;
  }

<div class="status-title">This page doesn't exist</div>
<div class="status-sub">The link might be broken, or the page may have moved. We'll take you back home in a moment.</div>

<a href="/" class="home-link" id="homeLink">Take me home now</a>

<div class="redirect-note" id="redirectNote">Redirecting automatically in <span id="countdown">3</span>s…</div>

<script>
  // ============================================================
  // REDIRECT TARGET
  // ------------------------------------------------------------
  // Change '/' below if this 404 page should send people somewhere
  // other than the site root (e.g. '/verify.html' or a full URL
  // like 'https://chrgeplus.com').
  // ============================================================
  const REDIRECT_TARGET = '/';
  const REDIRECT_DELAY_MS = 3200; // roughly matches the fill animation finishing

  document.getElementById('homeLink').setAttribute('href', REDIRECT_TARGET);

  // Respect users who've asked their OS/browser for reduced motion —
  // skip the countdown delay and go essentially immediately, since
  // there's no animation for them to wait for.
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const delay = prefersReducedMotion ? 400 : REDIRECT_DELAY_MS;

  let remaining = Math.round(delay / 1000);
  const countdownEl = document.getElementById('countdown');
  const noteEl = document.getElementById('redirectNote');

  if (prefersReducedMotion) {
    noteEl.textContent = 'Redirecting…';
  } else {
    const tick = setInterval(() => {
      remaining -= 1;
      if (remaining <= 0) {
        clearInterval(tick);
      } else {
        countdownEl.textContent = remaining;
      }
    }, 1000);
  }

  const redirectTimer = setTimeout(() => {
    window.location.href = REDIRECT_TARGET;
  }, delay);

  // If the person clicks "Take me home now," don't also fire the
  // timed redirect a moment later on top of their manual navigation.
  document.getElementById('homeLink').addEventListener('click', () => {
    clearTimeout(redirectTimer);
  });
</script>
