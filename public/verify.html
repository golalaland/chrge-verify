<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Your CHRGE+ Product</title>
<meta name="description" content="Verify the authenticity of your CHRGE+ product.">
<link rel="stylesheet" href="css/admin.css">
<style>
  body {
    background:
      radial-gradient(ellipse 700px 500px at 20% -10%, rgba(195,246,12,0.06), transparent 60%),
      var(--void);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1.2rem;
  }

  .verify-header { margin-bottom: 2rem; }
  .verify-logo { width: 130px; }

  .verify-card {
    width: 100%;
    max-width: 440px;
    background: var(--surface);
    border-radius: 20px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  /* ---- Manual entry state ---- */
  .entry-body { padding: 2rem; }
  .entry-title { font-family: var(--font-display); font-weight: 700; font-size: 1.3rem; margin-bottom: 0.4rem; }
  .entry-sub { color: var(--paper-dim); font-size: 0.88rem; margin-bottom: 1.6rem; line-height: 1.5; }
  .code-input {
    width: 100%;
    padding: 1rem 1.1rem;
    border-radius: 12px;
    border: 1.5px solid var(--border-strong);
    background: rgba(244,244,242,0.03);
    color: var(--paper);
    font-family: var(--font-mono);
    font-size: 1.1rem;
    letter-spacing: 0.08em;
    text-align: center;
    text-transform: uppercase;
    outline: none;
    margin-bottom: 1rem;
  }
  .code-input:focus { border-color: var(--accent); }
  .code-input::placeholder { color: var(--paper-faint); letter-spacing: 0.08em; }

  /* ---- Result states ---- */
  .status-banner {
    padding: 2.2rem 2rem 1.8rem;
    text-align: center;
  }
  .status-banner.genuine { background: linear-gradient(180deg, rgba(195,246,12,0.14), transparent); }
  .status-banner.warning { background: linear-gradient(180deg, rgba(255,184,0,0.14), transparent); }
  .status-banner.danger { background: linear-gradient(180deg, rgba(255,92,92,0.14), transparent); }

  .status-icon {
    width: 64px; height: 64px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1.1rem;
  }
  .status-icon.genuine { background: var(--accent); }
  .status-icon.warning { background: var(--warning); }
  .status-icon.danger { background: var(--danger); }

  .status-title {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 1.4rem;
    margin-bottom: 0.3rem;
  }
  .status-sub { color: var(--paper-dim); font-size: 0.88rem; }

  .result-body { padding: 1.6rem 2rem 2rem; }

  .product-block {
    display: flex;
    gap: 1rem;
    align-items: center;
    padding: 1rem;
    background: rgba(244,244,242,0.03);
    border-radius: 12px;
    margin-bottom: 1.2rem;
  }
  .product-image {
    width: 56px; height: 56px;
    border-radius: 10px;
    background: var(--surface-2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
  }
  .product-image img { width: 100%; height: 100%; object-fit: cover; }
  .product-name { font-family: var(--font-display); font-weight: 600; font-size: 0.95rem; margin-bottom: 0.15rem; }
  .product-meta { color: var(--paper-faint); font-size: 0.8rem; }

  .detail-row {
    display: flex; justify-content: space-between;
    padding: 0.65rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { color: var(--paper-faint); }
  .detail-value { font-family: var(--font-mono); color: var(--paper); }

  .suspicious-note {
    margin-top: 1rem;
    padding: 0.9rem 1rem;
    background: rgba(255,92,92,0.08);
    border: 1px solid rgba(255,92,92,0.25);
    border-radius: 10px;
    font-size: 0.8rem;
    color: #ffb3b3;
    line-height: 1.5;
  }

  .try-again-btn {
    display: block;
    width: 100%;
    text-align: center;
    padding: 0.85rem;
    border-radius: 10px;
    border: 1px solid var(--border-strong);
    background: transparent;
    color: var(--paper);
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    margin-top: 1.4rem;
  }

  .footer-note {
    margin-top: 2rem;
    text-align: center;
    color: var(--paper-faint);
    font-size: 0.78rem;
    max-width: 380px;
    line-height: 1.5;
  }
</style>
</head>

</div>
