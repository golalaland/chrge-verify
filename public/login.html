<meta name="robots" content="noindex, nofollow">
<title>Sign In — CHRGE Verify</title>
<link rel="stylesheet" href="css/admin.css">
<style>
  body {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 1.5rem;
    background:
      radial-gradient(ellipse 700px 500px at 20% -10%, rgba(195,246,12,0.08), transparent 60%),
      radial-gradient(ellipse 600px 400px at 100% 100%, rgba(195,246,12,0.05), transparent 60%),
      var(--void);
  }
  .login-card {
    width: 100%; max-width: 400px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem;
  }
  .login-logo { width: 130px; margin-bottom: 2rem; }
  .login-title { font-family: var(--font-display); font-weight: 700; font-size: 1.4rem; margin-bottom: 0.3rem; }
  .login-sub { color: var(--paper-dim); font-size: 0.88rem; margin-bottom: 2rem; }
  .error-banner {
    background: var(--danger-dim); border: 1px solid rgba(255,92,92,0.3);
    border-radius: var(--radius-sm); padding: 0.8rem 1rem;
    font-size: 0.83rem; color: #ffb3b3; margin-bottom: 1.4rem;
    display: none;
  }
  .error-banner.show { display: block; }
</style>

  <div class="login-title">CHRGE Verify</div>
  <div class="login-sub">Admin access only. Sign in to continue.</div>

  <div id="errorBanner" class="error-banner"></div>

  <form id="loginForm">
    <div class="form-group">
      <label class="form-label" for="email">Email</label>
      <input type="email" id="email" class="form-input" placeholder="you@chrgeplus.com" required autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <button type="submit" id="submitBtn" class="btn btn-primary" style="width:100%; justify-content:center; margin-top:0.6rem;">
      Sign in
    </button>
  </form>
